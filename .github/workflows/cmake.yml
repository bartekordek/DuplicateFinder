name: Linux Build

on: [push, pull_request]

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Debug
  BUILD_DIR: Build_Linux

jobs:
  build:
    # The CMake configure and build commands are platform agnostic and should work equally
    # well on Windows or Mac.  You can convert this to a matrix build if you need
    # cross-platform coverage.
    # See: https://docs.github.com/en/free-pro-team@latest/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Update env
      run: sudo apt-get update -y

    - name: Check env
      run: gcc -v

    - name: Update gcc
      run: sudo apt install g++ g++-14 gcc-14 && sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 800 --slave /usr/bin/g++ g++ /usr/bin/g++-14

    - name: Install Linux prequisities
      run: sudo apt install mesa-common-dev libxi-dev libglu1-mesa-dev libxrandr-dev libxinerama-dev libxcursor-dev libgtk-3-0 libgtk-3-dev

    - name: Configure CMake
      # Use a bash shell so we can use the same syntax for environment variable
      # access regardless of the host operating system
      shell: bash
      working-directory: ${{github.workspace}}
      # Note the current convention is to use the -S and -B options here to specify source
      # and build directories, but this is only available with CMake 3.13 and higher.
      # The CMake binaries on the Github Actions machines are (as of this writing) 3.12
      run: cmake -S . -B ${BUILD_DIR} -DENABLE_TRACY=OFF -DCMAKE_BUILD_TYPE=${BUILD_TYPE} -DCMAKE_POLICY_VERSION_MINIMUM=3.5

    - name: Build
      working-directory: ${{github.workspace}}
      shell: bash
      run: cmake --build ${BUILD_DIR} --config ${BUILD_TYPE} --target DuplicateFinderGUI_static DuplicateFinderGUI_dynamic DuplicateFinderWxWidgets_dynamic DuplicateFinderWxWidgets_static -j16
